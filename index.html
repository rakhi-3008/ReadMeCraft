<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReadMeCraft — GitHub Profile README Generator</title>
    <meta
      name="description"
      content="Generate a stunning GitHub profile README in seconds."
    />
    <link rel="stylesheet" href="css/app.css" />
    <link
      rel="icon"
      href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
fill="%23071821">

<rect width="30" height="30" rx="5" fill="%23071821"/>

<path d="M12 20h9"
stroke="%2300e5ff"
stroke-width="2"
stroke-linecap="round"/>

<path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
stroke="%2300e5ff"
stroke-width="2"
stroke-linecap="round"
fill="none"/>

</svg>'
    />
  </head>
  <body>
    <div id="app">
      <!-- ── 1. STICKY HEADER ── -->
      <div id="app-header"></div>
      <!-- ── 2. ABOUT / HERO — visible first on load ── -->
      <section id="app-about"></section>
      <!-- ── 3. GENERATOR TOOL ── -->
      <div id="app-tool">
        <div class="tool-label">
          <span>README Generator</span>&nbsp;— Fill in the form on the left, see
          the preview update live on the right
        </div>

        <div id="app-body">
          <!-- LEFT PANEL -->
          <div id="left-panel">
            <div id="tpl-bar"></div>
            <div id="sections-scroll"></div>
            <div id="status-bar"></div>
          </div>
          <!-- RIGHT PANEL -->
          <div id="right-panel"></div>
        </div>
      </div>
      <!-- ── 4. FOOTER ── -->
      <footer id="app-footer"></footer>
    </div>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
