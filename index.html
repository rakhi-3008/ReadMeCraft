<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>README.craft — GitHub Profile Generator</title>
  <meta name="description" content="Generate a stunning GitHub profile README in minutes."/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<div id="app">

  <!-- ── 1. STICKY HEADER ── -->
  <div id="app-header"></div>

  <!-- ── 2. ABOUT / HERO — visible first on load ── -->
  <section id="app-about"></section>

  <!-- ── 3. GENERATOR TOOL ── -->
  <div id="app-tool">
    <div class="tool-label">
      <!-- <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
      </svg> -->
      <span>README Generator</span>&nbsp;— Fill in the form on the left, see the preview update live on the right
    </div>
    
    <div id="app-body">

      <!-- LEFT PANEL -->
      <div id="left-panel">
        <div id="tpl-bar"></div>
        <div id="sections-scroll"></div>
        <div id="status-bar"></div>
      </div>

      <!-- RIGHT PANEL -->
      <div id="right-panel"></div>

    </div>
  </div>

  <!-- ── 4. FOOTER ── -->
  <footer id="app-footer"></footer>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
